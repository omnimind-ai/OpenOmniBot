<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Counter</title>
</head>
<body>
  <main data-oob-id="counter-root">
    <output id="value">0</output>
    <button data-oob-id="increment" onclick="window.oob.callApi('counter.increment', {})">+</button>
    <button data-oob-id="decrement" onclick="window.oob.callApi('counter.decrement', {})">-</button>
    <button data-oob-id="reset" onclick="window.oob.callApi('counter.reset', {})">Reset</button>
  </main>
  <script>
    window.oob.getProject().then(function(project) {
      document.getElementById('value').textContent = String(project.count || 0);
    });
    window.oob.onProjectUpdated(function(project) {
      document.getElementById('value').textContent = String(project.count || 0);
    });
  </script>
</body>
</html>
